# Ansible INI-style inventory file
# Groups let you target sets of servers with a single command (e.g. `ansible app ...`)
# Video ref: 0:20:04 - Inventory Files

# Application servers group
[app]
192.168.60.4
192.168.60.5

# Database server group
[db]
192.168.60.6

# Group-of-groups: "multi" includes both app and db
# The :children suffix tells Ansible this group is a group of groups
# Now `ansible multi ...` targets all 3 servers at once
[multi:children]
app
db

# Variables applied to all hosts in the "multi" group tree
# :vars section sets connection defaults so you don't repeat them per-host
[multi:vars]
# SSH user for the Vagrant boxes
ansible_ssh_user=vagrant
# Path to Vagrant's default insecure private key (works with insert_key: false)
ansible_ssh_private_key_file=~/.vagrant.d/insecure_private_key
