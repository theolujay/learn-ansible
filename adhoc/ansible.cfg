# Ansible configuration file -- placed in the project dir for per-project settings
# Ansible looks for ansible.cfg in: current dir -> ~/.ansible.cfg -> /etc/ansible/ansible.cfg
# Video ref: 0:05:31 - Ad-Hoc Commands

[defaults]
# Default inventory file so you can omit -i flag
INVENTORY = inventory.ini

# Skip host key checking for local Vagrant VMs (first SSH connection would prompt otherwise)
# In production you'd manage known_hosts properly instead
host_key_checking = False

# Explicitly set Python interpreter on managed nodes to avoid warnings
# Ubuntu 24.04 ships python3.12 at this path
interpreter_python = /usr/bin/python3.12
