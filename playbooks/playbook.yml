---
- name: Install Apache.
  hosts: all
  become: true

  handlers:
    - name: Restart Apache
      service:
        name: apache2
        state: restarted

  tasks:
    - name: Install Apache.
      apt:
        name:
          - apache2
          - apache2-utils
        state: present
        update_cache: true

    - name: Copy configuration files.
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: 0644
      with_items:
        - src: apache2.conf
          dest: /etc/apache2/apache2.conf
        - src: vhosts.conf
          dest: /etc/apache2/sites-available/default.conf
      notify: Restart Apache

    - name: Enable virtual host.
      file:
        src: /etc/apache2/sites-available/default.conf
        dest: /etc/apache2/sites-enabled/default.conf
        state: link
      notify: Restart Apache

    - name: Ensure Apache is started and enabled at boot.
      service:
        name: apache2
        state: started
        enabled: true